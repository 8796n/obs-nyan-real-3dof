spatial.name="nyan Spatial Audio (3DoF)"
spatial.notice="Anchors the sound at a fixed bearing in the virtual space (0 deg = forward after recentering) and pans it as the head turns. Add it to an application audio capture and point the bearing at where the matching screen appears. Adding the filter sets the parent source to monitor-only automatically, and the dock's 'Audio output' selector manages where monitoring goes (glasses by default). The app itself still plays outside OBS, so keep the Windows default output on a device you do not hear."
spatial.azimuth="Bearing (deg, + = right)"
spatial.azimuth_tooltip="Direction the sound comes from. 0 deg is forward after recentering, positive is right. Match it to where the corresponding screen appears on the virtual screen."
spatial.mode="Localization mode"
spatial.mode.point="Point source (downmix and pan)"
spatial.mode.balance="Balance (keep stereo)"
spatial.distance_gain="Follow screen distance"
spatial.distance_gain_tooltip="Scales the level with the dock's screen distance (4 m reference, closer is louder; limited to -12..+6 dB)."
audiowall.name="Spatial audio (Audio Wall)"
audiowall.notice="Auto-detects apps that are playing audio, derives each app's direction from its window position on the desktop, and plays them together as head-tracked spatial audio. No per-app captures or filters needed - just enable this group. The sound is heard over OBS's monitoring path (the app itself still plays outside OBS, so keep the Windows default output on a device you do not hear). Note: audio is per app; an app spread across screens collapses to one direction."
audiowall.current="Currently capturing:"
audiowall.proto_mismatch="! The Chrome extension speaks protocol v%lld but this plugin expects v%lld. Update whichever side is older."
audiowall.current_none="(no apps playing)"
audiowall.exclude="Excluded apps (comma separated)"
audiowall.exclude_tooltip="Exe names to keep out of the spatial mix (e.g. discord.exe, slack.exe). OBS itself is always excluded."
audiowall.ws_port="Browser ingest port (WebSocket)"
audiowall.ws_port_tooltip="Port on 127.0.0.1 where the bundled Chrome extension (tools/chrome-extension) delivers tab audio and window positions. Must match the extension's setting. If the bind fails (port in use), changing the number retries."
wsaudio.name="nyan Real Audio Wall browser stream"
