dock.eye_tooltip="Toggles the XREAL Eye's USB camera (UVC) output. The glasses re-enumerate their USB on switch, briefly dropping video and IMU. Marker-based 6DoF needs UVC enabled."
dock.monitor_out="Audio output"
dock.monitor_out_tooltip="Where the audio you hear on this PC (OBS audio monitoring) comes out. It does not affect the stream/recording audio. 'Auto: glasses' switches to the glasses' USB audio when detected (once per connection). Picking a specific device keeps the output pointed at it; while the device is absent the choice is remembered and re-applied as soon as it comes back. Spatial audio filters and the Audio Wall are heard through this output."
