display_wall.exclude_glasses_tooltip="Exclude displays whose EDID identifies them as supported AR glasses (XREAL / RayNeo). This prevents the wall from capturing the display the glasses show (a feedback loop through the source projector)."
display_wall.sync_output_size="Match OBS output size to Display Wall"
display_wall.sync_output_size_tooltip="When the Display Wall combined size changes, update the OBS base canvas and output resolution to the same size. Sync waits while streaming, recording, virtual camera, or replay buffer output is active."
display_wall.name_filter="Name filter"
display_wall.name_filter_tooltip="Optional comma/pipe-separated filter matched against Windows identify number, display name, device name, and device ID. Leave empty to include every non-primary display."
