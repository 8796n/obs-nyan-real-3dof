source_global_notice="Device connection, pose estimation, screen distance, and screen size are managed in the nyan Real 3DoF dock. This source renders a selected source or scene as a 3DoF virtual screen."
source.render_resolution_notice="Render resolution (the view size used to look at the wider referenced source through the glasses) is set automatically: the detected glasses display mode when connected, otherwise the HID device's native resolution. Current:"
