screen_curve="Screen curve"
ipd_mm="IPD (mm)"
ipd_tooltip="Eye separation used for SBS output. Set it to your interpupillary distance so the virtual screen converges at the screen distance (the eyes naturally converge more as the distance shrinks). Has no effect while SBS output is off."
