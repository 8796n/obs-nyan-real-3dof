screen_distance_m="Screen distance (m)"
screen_distance_tooltip="Distance to the virtual screen. Its physical size is kept, so closer looks bigger; with SBS output the stereo parallax follows the distance too. The glasses' focal plane is fixed, so distances under 0.5 m cause vergence-accommodation conflict and tire the eyes - best kept brief."
screen_dist_marker="Screen distance from marker"
screen_dist_marker_tooltip="Each recenter sets the screen distance to the measured distance to the marker, scaling the screen size factor along with it so the apparent size stays put. With the tag near the real monitor, the virtual screen lands on the monitor plane and leaning gives true-to-life perspective."
