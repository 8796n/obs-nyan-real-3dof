dock.open_projector="Fullscreen on glasses"
dock.open_projector_tooltip="Open the virtual screen's fullscreen source projector on the glasses display (identified by EDID). An existing projector on that display is closed first, so clicking again simply reopens it."
dock.auto_projector="Auto fullscreen when detected"
dock.auto_projector_tooltip="When the glasses display, the HID device, and a virtual screen source are all present, open the fullscreen source projector automatically (once per connection). Existing projectors on the glasses display are replaced, never stacked."
dock.cursor_fence="Keep the cursor off the glasses display"
dock.cursor_fence_tooltip="When the mouse cursor tries to move onto the glasses display, it tunnels through to the display on the far side (so layouts with the glasses display in the middle keep full cursor reachability). With no display beyond, the edge acts as a wall. Active only while a glasses display is detected."
