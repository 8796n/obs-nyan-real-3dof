dock.cursor_fence_tooltip="マウスカーソルがメガネ画面へ移動しようとしたとき、反対側のディスプレイへ通り抜けさせます (メガネ画面が間に挟まる配置でもカーソルの行き来は保たれます)。反対側にディスプレイが無い場合は端で止まります。メガネ画面が検出されている間だけ働きます。"
