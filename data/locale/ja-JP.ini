spatial.name="nyan 空間音響 (3DoF)"
spatial.notice="音源をリセンター後の正面を 0° とした仮想空間の方位に固定し、頭の向きに合わせて左右の聞こえ方を変えます。アプリケーション音声キャプチャなどに掛けて、対応する画面の見える方向に方位角を合わせてください。フィルター追加時に親ソースは自動で「モニターのみ」になり、モニタリングデバイスはドックの自動設定がメガネへ向けます。アプリ本体の音は OBS を通らないため、Windows の既定の出力デバイスはメガネ以外（聞こえないデバイス）にしてください。"
spatial.azimuth="方位角 (度、右が +)"
spatial.azimuth_tooltip="音源を置く方向です。リセンター後の正面が 0°、右が正、左が負。仮想スクリーン上の対応する画面が見える方向に合わせます。"
spatial.mode="定位モード"
spatial.mode.point="点音源（モノ化して定位）"
spatial.mode.balance="バランス（ステレオ維持）"
spatial.distance_gain="スクリーン距離で音量を変える"
spatial.distance_gain_tooltip="ドックのスクリーン距離に応じて音量を増減します（4m 基準、近いほど大きい。-12〜+6dB に制限）。"
audiowall.name="nyan Real Audio Wall"
audiowall.notice="音を再生中のアプリを自動検出し、ウィンドウのデスクトップ上の位置から方向を割り出して、頭の向きに追従する空間音響としてまとめて鳴らします。アプリ音声キャプチャの追加もフィルター設定も不要で、このソースを置くだけです。音は OBS のモニタリング経由で聞こえます（アプリ本体の音は OBS を通らないため、Windows の既定の出力デバイスはメガネ以外にしてください）。注意: 音はアプリ単位です。同じアプリを複数画面に広げた場合は 1 方向にまとまります。"
audiowall.current="現在キャプチャ中:"
audiowall.current_none="（再生中のアプリなし）"
audiowall.exclude="除外するアプリ (カンマ区切り)"
audiowall.exclude_tooltip="空間音響に乗せたくないアプリの exe 名をカンマ区切りで指定します（例: discord.exe, slack.exe）。OBS 自身は常に除外されます。"
audiowall.ws_port="ブラウザ連携ポート (WebSocket)"
audiowall.ws_port_tooltip="同梱の Chrome 拡張 (tools/chrome-extension) がタブの音声と窓の位置を送ってくる 127.0.0.1 上のポートです。拡張側の設定と同じ番号にしてください。使用中でバインドに失敗した場合は番号を変えると再試行します。"
