<!DOCTYPE html>
<!-- SPDX-License-Identifier: GPL-2.0-or-later
     Copyright (C) 2026 8796n <info@8796.jp>
     nyan Real 3DoF phone remote: a single-file touchpad page served by the
     plugin's LAN WebSocket server (src/remote_control.cpp). The access token
     arrives in the page URL (?t=...) and is echoed back on the WS upgrade. -->
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#141417">
<title>nyan Real 3DoF Remote</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-user-select: none; user-select: none; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow: hidden; overscroll-behavior: none; }
  body {
    display: flex; flex-direction: column; gap: 8px;
    height: 100dvh; padding: 10px;
    padding-top: calc(10px + env(safe-area-inset-top));
    padding-bottom: calc(10px + env(safe-area-inset-bottom));
    background: #141417; color: #d6d6dc;
    font-family: system-ui, sans-serif;
    touch-action: none;
  }
  .row { display: flex; gap: 8px; }
  button {
    border: 1px solid #34343c; border-radius: 12px;
    background: #222228; color: #d6d6dc;
    font-size: 15px; padding: 12px 8px;
    touch-action: none;
  }
  button:active, button.held { background: #3c3c48; }
  #top button { flex: 1; }
  #status { display: flex; align-items: center; gap: 6px; padding: 0 4px; font-size: 12px; color: #8a8a94; }
  #dot { width: 9px; height: 9px; border-radius: 50%; background: #c0463f; flex: none; }
  #dot.on { background: #4caf50; }
  #mid { flex: 1; display: flex; gap: 8px; min-height: 0; }
  #pad {
    flex: 1; border: 1px solid #2c2c34; border-radius: 14px; background: #1a1a1f;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px;
    color: #4c4c56; font-size: 13px; text-align: center; line-height: 1.7;
    touch-action: none;
  }
  #strip {
    width: 64px; border: 1px solid #2c3340; border-radius: 14px; background: #1b2027;
    display: flex; flex-direction: column; align-items: center; justify-content: space-between;
    padding: 12px 0; color: #7e8aa0; font-size: 12px;
    touch-action: none;
  }
  #strip .arrow { font-size: 16px; color: #55607a; }
  #dist-box { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  #dist { font-size: 14px; color: #aab6cc; font-variant-numeric: tabular-nums; }
  #bottom button { padding: 16px 8px; }
  #btn-left { flex: 2; }
  #btn-right { flex: 1; }
  #overlay {
    position: absolute; inset: 0; background: #141417;
    display: none; align-items: center; justify-content: center;
    padding: 24px; text-align: center; color: #c0463f; font-size: 15px; line-height: 1.8;
  }
</style>
</head>
<body>
  <div id="top" class="row">
    <button id="btn-recenter">センター</button>
    <button id="btn-recal">再較正</button>
    <button id="btn-fs" style="flex:0 0 52px" aria-label="fullscreen">⛶</button>
  </div>
  <div id="mid">
    <div id="pad"><span id="pad-title" style="font-size:15px;color:#5a5a66">タッチパッド</span><span id="pad-hint"></span></div>
    <div id="strip">
      <span class="arrow">▲</span>
      <div id="dist-box"><span id="dist-label">距離</span><span id="dist">-</span></div>
      <span class="arrow">▼</span>
    </div>
  </div>
  <div id="bottom" class="row">
    <button id="btn-left">左クリック</button>
    <button id="btn-right">右クリック</button>
  </div>
  <div id="status"><span id="dot"></span><span id="status-text">…</span></div>
  <div id="overlay"></div>
<script>
'use strict';
const $ = id => document.getElementById(id);
const jp = (navigator.language || '').toLowerCase().startsWith('ja');
const L = jp ? {
  recenter: 'センター', recal: '再較正', left: '左クリック', right: '右クリック',
  pad: 'タッチパッド',
  hint: '1本指: 移動 ・ タップ: 左クリック<br>2本指: スクロール ・ 2本指タップ: 右クリック',
  distLabel: '距離', conn: '接続中', disc: '再接続中…',
  noToken: 'アクセストークンがありません。<br>OBS の nyan Real 3DoF ドックに表示される QR コードからこのページを開いてください。',
} : {
  recenter: 'Center', recal: 'Recalibrate', left: 'Left click', right: 'Right click',
  pad: 'Touchpad',
  hint: '1 finger: move / tap: left click<br>2 fingers: scroll / 2-finger tap: right click',
  distLabel: 'Distance', conn: 'Connected', disc: 'Reconnecting…',
  noToken: 'Missing access token.<br>Open this page from the QR code shown in the nyan Real 3DoF dock in OBS.',
};
$('btn-recenter').textContent = L.recenter;
$('btn-recal').textContent = L.recal;
$('btn-left').textContent = L.left;
$('btn-right').textContent = L.right;
$('pad-title').textContent = L.pad;
$('pad-hint').innerHTML = L.hint;
$('dist-label').textContent = L.distLabel;

const token = new URLSearchParams(location.search).get('t') || '';
if (!token) {
  const o = $('overlay');
  o.innerHTML = L.noToken;
  o.style.display = 'flex';
}

const vibrate = ms => { if (navigator.vibrate) navigator.vibrate(ms); };

let ws = null, wsOpen = false;
function setStatus(on) {
  $('dot').className = on ? 'on' : '';
  $('status-text').textContent = on ? L.conn : L.disc;
}
function connect() {
  if (!token) return;
  ws = new WebSocket('ws://' + location.host + '/ws?t=' + encodeURIComponent(token));
  ws.onopen = () => { wsOpen = true; setStatus(true); };
  ws.onclose = () => { wsOpen = false; setStatus(false); setTimeout(connect, 1200); };
  ws.onerror = () => { try { ws.close(); } catch (e) {} };
  ws.onmessage = ev => {
    try {
      const m = JSON.parse(ev.data);
      if (m.t === 'state' && typeof m.dist === 'number')
        $('dist').textContent = m.dist.toFixed(2) + ' m';
    } catch (e) {}
  };
}
function send(obj) {
  if (wsOpen && ws && ws.readyState === 1) ws.send(JSON.stringify(obj));
}
setStatus(false);
connect();

/* Outbound events are coalesced per animation frame so a fast drag becomes
   one WS message per display refresh instead of one per touch event. */
let pendDx = 0, pendDy = 0, pendWheel = 0, pendDist = 0, rafQueued = false;
function flushSoon() {
  if (rafQueued) return;
  rafQueued = true;
  requestAnimationFrame(() => {
    rafQueued = false;
    if (pendDx || pendDy) {
      send({ t: 'mv', dx: +pendDx.toFixed(1), dy: +pendDy.toFixed(1) });
      pendDx = pendDy = 0;
    }
    if (pendWheel) {
      send({ t: 'whl', n: +pendWheel.toFixed(3) });
      pendWheel = 0;
    }
    if (pendDist) {
      send({ t: 'dist', s: +pendDist.toFixed(2) });
      pendDist = 0;
    }
  });
}

/* Touchpad: 1-finger move, tap = left click, 2-finger vertical = wheel,
   2-finger tap = right click. */
const SENS = 1.7;          // touchpad px -> cursor px
const WHEEL_PX = 60;       // 2-finger px per wheel notch
const pad = $('pad');
const fingers = new Map();
let maxFingers = 0, gestureT0 = 0, travel = 0;
pad.addEventListener('pointerdown', e => {
  pad.setPointerCapture(e.pointerId);
  fingers.set(e.pointerId, { x: e.clientX, y: e.clientY });
  if (fingers.size === 1) { gestureT0 = performance.now(); travel = 0; maxFingers = 0; }
  maxFingers = Math.max(maxFingers, fingers.size);
});
pad.addEventListener('pointermove', e => {
  const f = fingers.get(e.pointerId);
  if (!f) return;
  const dx = e.clientX - f.x, dy = e.clientY - f.y;
  f.x = e.clientX; f.y = e.clientY;
  travel += Math.abs(dx) + Math.abs(dy);
  if (fingers.size === 1 && maxFingers === 1) {
    pendDx += dx * SENS;
    pendDy += dy * SENS;
  } else if (fingers.size === 2) {
    // Both fingers report moves; halving keeps the sum at finger speed.
    pendWheel += -(dy * 0.5) / WHEEL_PX;
  }
  flushSoon();
});
function padEnd(e) {
  if (!fingers.delete(e.pointerId)) return;
  if (fingers.size) return;
  const quick = performance.now() - gestureT0 < 300 && travel < 14;
  if (quick && maxFingers === 1) { clickTap(0); }
  else if (quick && maxFingers === 2) { clickTap(1); }
  maxFingers = 0;
}
pad.addEventListener('pointerup', padEnd);
pad.addEventListener('pointercancel', padEnd);
function clickTap(b) {
  send({ t: 'btn', b: b, d: true });
  send({ t: 'btn', b: b, d: false });
  vibrate(8);
}

/* Edge strip: vertical drag steps the virtual-screen distance on the
   plugin's log scale. Up = push the screen away, down = pull it closer. */
const DIST_PX = 7; // px per distance step (~1.05x each)
const strip = $('strip');
const stripPts = new Map();
strip.addEventListener('pointerdown', e => {
  strip.setPointerCapture(e.pointerId);
  stripPts.set(e.pointerId, e.clientY);
});
strip.addEventListener('pointermove', e => {
  if (!stripPts.has(e.pointerId)) return;
  const dy = e.clientY - stripPts.get(e.pointerId);
  stripPts.set(e.pointerId, e.clientY);
  pendDist += -dy / DIST_PX;
  flushSoon();
});
const stripEnd = e => stripPts.delete(e.pointerId);
strip.addEventListener('pointerup', stripEnd);
strip.addEventListener('pointercancel', stripEnd);

/* Click buttons hold for drags: down on press, up on release. */
function bindButton(id, b) {
  const el = $(id);
  el.addEventListener('pointerdown', e => {
    el.setPointerCapture(e.pointerId);
    el.classList.add('held');
    send({ t: 'btn', b: b, d: true });
    vibrate(5);
  });
  const up = () => {
    el.classList.remove('held');
    send({ t: 'btn', b: b, d: false });
  };
  el.addEventListener('pointerup', up);
  el.addEventListener('pointercancel', up);
}
bindButton('btn-left', 0);
bindButton('btn-right', 1);
$('btn-recenter').addEventListener('click', () => { send({ t: 'recenter' }); vibrate(10); });
$('btn-recal').addEventListener('click', () => { send({ t: 'recal' }); vibrate(10); });

/* Fullscreen (Android Chrome; iOS Safari hides the button). */
const fsBtn = $('btn-fs');
if (document.documentElement.requestFullscreen) {
  fsBtn.addEventListener('click', () => {
    if (document.fullscreenElement) document.exitFullscreen();
    else document.documentElement.requestFullscreen().catch(() => {});
  });
} else {
  fsBtn.style.display = 'none';
}

/* Keep the screen awake while the remote is open. */
let wakeLock = null;
async function lock() {
  try { wakeLock = await navigator.wakeLock.request('screen'); } catch (e) {}
}
document.addEventListener('visibilitychange', () => { if (!document.hidden) lock(); });
lock();

document.addEventListener('contextmenu', e => e.preventDefault());
</script>
</body>
</html>
