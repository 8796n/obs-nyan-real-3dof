<!DOCTYPE html>
<!-- SPDX-License-Identifier: GPL-2.0-or-later

     nyan Real 3DoF phone remote: a single-file touchpad page served by the
     plugin's LAN WebSocket server (src/remote_control.cpp). The access token
     arrives in the page URL (?t=...) and is echoed back on the WS upgrade. -->
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="nyan Remote">
<meta name="theme-color" content="#141417">
<title>nyan Real 3DoF Remote</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-user-select: none; user-select: none; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow: hidden; overscroll-behavior: none; }
  body {
    display: flex; flex-direction: column; gap: 8px;
    height: 100dvh; padding: 10px;
    padding-top: calc(10px + env(safe-area-inset-top));
    padding-bottom: calc(10px + env(safe-area-inset-bottom));
    background: #141417; color: #d6d6dc;
    font-family: system-ui, sans-serif;
    touch-action: none;
  }
  .row { display: flex; gap: 8px; }
  button {
    border: 1px solid #34343c; border-radius: 12px;
    background: #222228; color: #d6d6dc;
    font-size: 15px; padding: 12px 8px;
    touch-action: none;
  }
  button:active { background: #3c3c48; }
  #top button { flex: 1; }
  #status { display: flex; align-items: center; gap: 6px; padding: 0 4px; font-size: 12px; color: #8a8a94; }
  #dot { width: 9px; height: 9px; border-radius: 50%; background: #c0463f; flex: none; }
  #dot.on { background: #4caf50; }
  #mid { flex: 1; display: flex; gap: 8px; min-height: 0; }
  #pad {
    flex: 1; border: 1px solid #2c2c34; border-radius: 14px; background: #1a1a1f;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px;
    color: #4c4c56; font-size: 13px; text-align: center; line-height: 1.7;
    touch-action: none;
  }
  #pad.drag { border-color: #4caf50; }
  #strip {
    width: 64px; border: 1px solid #2c3340; border-radius: 14px; background: #1b2027;
    display: flex; flex-direction: column; align-items: center; justify-content: space-between;
    padding: 12px 0; color: #7e8aa0; font-size: 12px;
    touch-action: none;
  }
  #strip .arrow { font-size: 16px; color: #55607a; }
  #dist-box { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  #dist { font-size: 14px; color: #aab6cc; font-variant-numeric: tabular-nums; }
  #overlay {
    position: absolute; inset: 0; background: #141417;
    display: none; align-items: center; justify-content: center;
    padding: 24px; text-align: center; color: #c0463f; font-size: 15px; line-height: 1.8;
  }
</style>
</head>
<body>
  <div id="top" class="row">
    <button id="btn-recenter">センター</button>
    <button id="btn-recal">再較正</button>
    <button id="btn-fs" style="flex:0 0 52px" aria-label="fullscreen">⛶</button>
  </div>
  <div id="mid">
    <div id="pad"><span id="pad-title" style="font-size:15px;color:#5a5a66">タッチパッド</span><span id="pad-hint"></span></div>
    <div id="strip">
      <span class="arrow">▲</span>
      <div id="dist-box"><span id="dist-label">距離</span><span id="dist">-</span></div>
      <span class="arrow">▼</span>
    </div>
  </div>
  <!-- Bump the rev when changing this file: the dim corner marker lets a
       phone verify it got the new page without devtools. Tapping it fires a
       long test vibration - a bare navigator.vibrate() check, independent of
       any gesture logic. -->
  <div id="status"><span id="dot"></span><span id="status-text">…</span><span id="rev" style="margin-left:auto;color:#3c3c44;font-size:10px;">r4</span></div>
  <div id="overlay"></div>
<script>
'use strict';
const $ = id => document.getElementById(id);
const jp = (navigator.language || '').toLowerCase().startsWith('ja');
const L = jp ? {
  recenter: 'センター', recal: '再較正',
  pad: 'タッチパッド',
  hint: '1本指: 移動 ・ タップ: 左クリック<br>長押し: ドラッグ (指を離しても一瞬なら継続)<br>2本指: スクロール ・ 2本指タップ: 右クリック',
  distLabel: '距離', conn: '接続中', disc: '再接続中…',
  noToken: 'アクセストークンがありません。<br>OBS の nyan Real 3DoF ドックに表示される QR コードからこのページを開いてください。',
} : {
  recenter: 'Center', recal: 'Recalibrate',
  pad: 'Touchpad',
  hint: '1 finger: move / tap: left click<br>hold: drag (brief lifts keep it going)<br>2 fingers: scroll / 2-finger tap: right click',
  distLabel: 'Distance', conn: 'Connected', disc: 'Reconnecting…',
  noToken: 'Missing access token.<br>Open this page from the QR code shown in the nyan Real 3DoF dock in OBS.',
};
$('btn-recenter').textContent = L.recenter;
$('btn-recal').textContent = L.recal;
$('pad-title').textContent = L.pad;
$('pad-hint').innerHTML = L.hint;
$('dist-label').textContent = L.distLabel;

const token = new URLSearchParams(location.search).get('t') || '';
if (!token) {
  const o = $('overlay');
  o.innerHTML = L.noToken;
  o.style.display = 'flex';
}

const vibrate = ms => { if (navigator.vibrate) navigator.vibrate(ms); };

let ws = null, wsOpen = false, reconnectTimer = 0;
function setStatus(on) {
  $('dot').className = on ? 'on' : '';
  $('status-text').textContent = on ? L.conn : L.disc;
}
function connect() {
  if (!token) return;
  if (ws && ws.readyState <= 1) return; // CONNECTING or OPEN already
  clearTimeout(reconnectTimer);
  ws = new WebSocket('ws://' + location.host + '/ws?t=' + encodeURIComponent(token));
  ws.onopen = () => { wsOpen = true; setStatus(true); };
  ws.onclose = () => {
    wsOpen = false; setStatus(false);
    clearTimeout(reconnectTimer);
    reconnectTimer = setTimeout(connect, 1200);
  };
  ws.onerror = () => { try { ws.close(); } catch (e) {} };
  ws.onmessage = ev => {
    try {
      const m = JSON.parse(ev.data);
      if (m.t === 'state' && typeof m.dist === 'number')
        $('dist').textContent = m.dist.toFixed(2) + ' m';
    } catch (e) {}
  };
}
function send(obj) {
  if (wsOpen && ws && ws.readyState === 1) ws.send(JSON.stringify(obj));
}
setStatus(false);
connect();
/* Liveness heartbeat: lets the plugin evict this session ~12 s after the
   screen locks or Wi-Fi drops (its dock then shows the QR code again).
   Background tabs throttle timers, which is exactly the signal we want. */
setInterval(() => send({ t: 'hb' }), 4000);

/* Outbound events are coalesced per animation frame so a fast drag becomes
   one WS message per display refresh instead of one per touch event. */
let pendDx = 0, pendDy = 0, pendWheel = 0, pendDist = 0, rafQueued = false;
function flushSoon() {
  if (rafQueued) return;
  rafQueued = true;
  requestAnimationFrame(() => {
    rafQueued = false;
    if (pendDx || pendDy) {
      send({ t: 'mv', dx: +pendDx.toFixed(1), dy: +pendDy.toFixed(1) });
      pendDx = pendDy = 0;
    }
    if (pendWheel) {
      send({ t: 'whl', n: +pendWheel.toFixed(3) });
      pendWheel = 0;
    }
    if (pendDist) {
      send({ t: 'dist', s: +pendDist.toFixed(2) });
      pendDist = 0;
    }
  });
}

/* Touchpad: 1-finger move, tap = left click, press-and-hold = drag (left
   button held; a brief lift and re-touch continues the drag, so long drags
   can be done in strokes), 2-finger vertical = wheel, 2-finger tap = right
   click. */
const SENS = 1.7;          // touchpad px -> cursor px
const WHEEL_PX = 60;       // 2-finger px per wheel notch
const HOLD_MS = 350;       // stationary press before a drag starts
const HOLD_TRAVEL = 12;    // px of movement that cancels the hold
const DRAG_LOCK_MS = 250;  // lift shorter than this keeps the drag held
const pad = $('pad');
const fingers = new Map();
let maxFingers = 0, gestureT0 = 0, travel = 0;
let holdTimer = 0, dragging = false, dragReleaseTimer = 0;
pad.addEventListener('pointerdown', e => {
  pad.setPointerCapture(e.pointerId);
  fingers.set(e.pointerId, { x: e.clientX, y: e.clientY });
  if (fingers.size === 1) {
    gestureT0 = performance.now(); travel = 0; maxFingers = 0;
    if (dragging) {
      // Re-touch inside the release window: same drag, next stroke.
      clearTimeout(dragReleaseTimer);
    } else {
      clearTimeout(holdTimer);
      holdTimer = setTimeout(() => {
        if (fingers.size === 1 && travel < HOLD_TRAVEL && !dragging) {
          dragging = true;
          send({ t: 'btn', b: 0, d: true });
          pad.classList.add('drag');
          vibrate(30);
        }
      }, HOLD_MS);
    }
  } else {
    // A second finger means a 2-finger gesture, not a hold.
    clearTimeout(holdTimer);
  }
  maxFingers = Math.max(maxFingers, fingers.size);
});
pad.addEventListener('pointermove', e => {
  const f = fingers.get(e.pointerId);
  if (!f) return;
  const dx = e.clientX - f.x, dy = e.clientY - f.y;
  f.x = e.clientX; f.y = e.clientY;
  travel += Math.abs(dx) + Math.abs(dy);
  if (fingers.size === 1 && maxFingers === 1) {
    pendDx += dx * SENS;
    pendDy += dy * SENS;
  } else if (fingers.size === 2 && !dragging) {
    // Both fingers report moves; halving keeps the sum at finger speed.
    pendWheel += -(dy * 0.5) / WHEEL_PX;
  }
  flushSoon();
});
function padEnd(e) {
  if (!fingers.delete(e.pointerId)) return;
  if (fingers.size) return;
  clearTimeout(holdTimer);
  if (dragging) {
    // Defer the button release: re-touching within the window continues
    // the drag (the border stays green until it really ends).
    clearTimeout(dragReleaseTimer);
    dragReleaseTimer = setTimeout(() => {
      dragging = false;
      send({ t: 'btn', b: 0, d: false });
      pad.classList.remove('drag');
      vibrate(15);
    }, DRAG_LOCK_MS);
  } else {
    const quick = performance.now() - gestureT0 < 300 && travel < 14;
    if (quick && maxFingers === 1) { clickTap(0); }
    else if (quick && maxFingers === 2) { clickTap(1); }
  }
  maxFingers = 0;
}
pad.addEventListener('pointerup', padEnd);
pad.addEventListener('pointercancel', padEnd);
function clickTap(b) {
  send({ t: 'btn', b: b, d: true });
  send({ t: 'btn', b: b, d: false });
  vibrate(15);
}

/* Edge strip: vertical drag walks the viewer toward/away from the gazed-at
   point on the plugin's log scale. Up = back away, down = walk closer.
   A weak haptic tick every couple of steps gives it a wheel-detent feel. */
const DIST_PX = 7;       // px per distance step (~1.05x each)
const DETENT_STEPS = 2;  // steps per haptic tick (~1.1x per click)
const strip = $('strip');
const stripPts = new Map();
let detentAcc = 0, lastDetentMs = 0;
strip.addEventListener('pointerdown', e => {
  strip.setPointerCapture(e.pointerId);
  stripPts.set(e.pointerId, e.clientY);
  detentAcc = 0;
});
strip.addEventListener('pointermove', e => {
  if (!stripPts.has(e.pointerId)) return;
  const dy = e.clientY - stripPts.get(e.pointerId);
  stripPts.set(e.pointerId, e.clientY);
  const steps = -dy / DIST_PX;
  pendDist += steps;
  detentAcc += steps;
  const clicks = Math.floor(Math.abs(detentAcc) / DETENT_STEPS);
  if (clicks) {
    detentAcc -= Math.sign(detentAcc) * clicks * DETENT_STEPS;
    // Rate-limited pulse: every vibrate() call cancels the previous one,
    // and many phone motors cannot render pulses under ~20 ms at all, so
    // rapid short per-event calls would silence the ratchet entirely.
    const now = performance.now();
    if (now - lastDetentMs >= 50) {
      lastDetentMs = now;
      vibrate(20);
    }
  }
  flushSoon();
});
const stripEnd = e => stripPts.delete(e.pointerId);
strip.addEventListener('pointerup', stripEnd);
strip.addEventListener('pointercancel', stripEnd);

$('btn-recenter').addEventListener('click', () => { send({ t: 'recenter' }); vibrate(20); });
$('btn-recal').addEventListener('click', () => { send({ t: 'recal' }); vibrate(20); });

/* Fullscreen (Android Chrome; iOS Safari hides the button). */
const fsBtn = $('btn-fs');
if (document.documentElement.requestFullscreen) {
  fsBtn.addEventListener('click', () => {
    if (document.fullscreenElement) document.exitFullscreen();
    else document.documentElement.requestFullscreen().catch(() => {});
  });
} else {
  fsBtn.style.display = 'none';
}

/* Keep the screen awake while the remote is open; on return to the
   foreground re-acquire it and reconnect right away (the plugin evicts
   idle sessions, so the old socket is usually gone by then). */
let wakeLock = null;
async function lock() {
  try { wakeLock = await navigator.wakeLock.request('screen'); } catch (e) {}
}
document.addEventListener('visibilitychange', () => {
  if (document.hidden) return;
  lock();
  if (!ws || ws.readyState > 1) connect();
});
lock();

document.addEventListener('contextmenu', e => e.preventDefault());
/* Suppress the browser's native long-press gesture (its OS haptic at
   ~500 ms reads as a late, misplaced drag cue). Pointer events still fire;
   only the derived defaults are dropped. */
const stopNative = e => e.preventDefault();
pad.addEventListener('touchstart', stopNative, { passive: false });
strip.addEventListener('touchstart', stopNative, { passive: false });

/* Vibration self-test: tap the rev marker for one long, unmistakable buzz.
   If this stays silent, navigator.vibrate is dead in this browser/device
   (iOS Safari, Brave, or an OS touch-feedback setting). */
$('rev').addEventListener('click', () => {
  const ok = navigator.vibrate ? navigator.vibrate(200) : false;
  $('rev').textContent = (navigator.vibrate ? (ok ? 'vib✓' : 'vib✗') : 'no API') + ' r4';
});
</script>
</body>
</html>
